name: Publish v0.1.0 release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.1.0.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release and record completion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v0.1.0 already exists."
          else
            cat > "$RUNNER_TEMP/release-notes.md" <<'NOTES'
          Initial public release of Sonic AI Music Workflow.

          Highlights:
          - Structured song production briefs
          - Editable prompt drafts for Suno and Lyria
          - Generation version tracking and scoring
          - Browser local storage
          - JSON import and export
          - Markdown export
          - Local-first design with no required account or server
          - Open-source documentation, issue templates, security policy, and contribution guidelines
          NOTES
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Sonic AI Music Workflow v0.1.0" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

          marker_content="$(printf 'Release v0.1.0 created and verified by GitHub Actions.\n' | base64 -w0)"
          gh api \
            --method PUT \
            "repos/$GITHUB_REPOSITORY/contents/.github/release-v0.1.0-complete" \
            -f message="Record v0.1.0 release completion" \
            -f content="$marker_content"
